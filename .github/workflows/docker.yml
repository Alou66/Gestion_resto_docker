name: CI/CD Docker Pipeline

on:
  push:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/gestion_resto:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/gestion_resto:${{ github.sha }}
